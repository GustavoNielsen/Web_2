<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Manutenção de Equipamentos</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background-color: #3D3D3D;">
    
  <div class="container d-flex justify-content-center align-items-center vh-100">
    
    <div class="card shadow-lg" style="width: 100%; max-width: 400px; border: 2px solid #FA9549;">
      
      <div class="card-header text-white text-center py-3" style="background-color: #FA9549;">
        <h1 class="h4 mb-0" style="font-weight: bold; text-transform: uppercase;">Realizar Login</h1>
      </div>

      <div class="card-body p-4" style="background-color: #f8f9fa;">
        <form>
          <div class="mb-3">
            <label for="email" class="form-label" style="color: #5F668C; font-weight: bold;">E-mail de Acesso</label>
            <input type="email" class="form-control" id="email" name="email" placeholder="nome@email.com" required>
          </div>

          <div class="mb-4">
            <label for="password" class="form-label" style="color: #5F668C; font-weight: bold;">Senha</label>
            <input type="password" class="form-control" id="password" name="password" placeholder="Sua senha" required>
          </div>

          <button type="submit" class="btn text-white w-100 mb-3" style="background-color: #FA9549; border: none; font-weight: bold;">
            ENTRAR
          </button>

          <div class="text-center mt-3 border-top pt-3">
            <p class="mb-0" style="color: #787878;">Ainda não tem cadastro?</p>
            <a href="#" class="text-decoration-none" style="color: #FA9549; font-weight: bold;">Cadastre-se aqui</a>
          </div>
        </form>
      </div>
    </div>
  </div>

</body>
</html>
