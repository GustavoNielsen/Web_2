<div class="container-fluid mt-4">
  <div class="row justify-content-center">
    <div class="col-lg-8 col-md-10 col-11">
 
      <div class="card shadow border-0">
        <div class="card-header bg-primary text-white py-3 d-flex justify-content-between align-items-center">
        <h1 class="mb-0 h4 fw-bold">Funcionários</h1>
        <a [routerLink]="['/funcionario/users/novo']" class="btn btn-light btn-sm fw-bold">
            <i class="fa fa-plus"></i> Novo
          </a>
        </div>
        <div class="card-body p-4 bg-light"></div>
          <table class="table table-striped table-bordered table-hover bg-white mb-0">
            <thead class="table-primary">
              <tr>
                <th>Nome</th>
                <th>E-mail</th>
                <th>Data de Nascimento</th>
                <th class="text-center" style="width: 180px">Ações
                </th>
             </tr>
             </thead>
             <tbody>
    @for (funcionario of funcionarios; track $index) {
      <tr>
        <td>{{ funcionario.nome }}</td>
        <td>{{ funcionario.email }}</td>
        <td>{{ funcionario.nasc | date:'dd/MM/yyyy' }}</td>
        <td class="text-center" >
          <a  class="btn btn-sm btn-info me-1" title="Editar"
              [routerLink]="['/funcionario/users/editar', funcionario.id]">
            <i class="fa fa-edit" aria-hidden="true"></i> Editar
          </a>
         <a href="#" title="Remover" alt="Remover" class="btn btn-xs btn-danger"
            (click)="remover($event, funcionario)">
            <i class="fa fa-times"></i> Remover
        </a>
        </td>
      </tr>
    }
    @empty {
      <tr>
        <td colspan="4" class="text-center">Nenhum funcionário cadastrado.</td>
      </tr>
    }
  </tbody>
</table>
