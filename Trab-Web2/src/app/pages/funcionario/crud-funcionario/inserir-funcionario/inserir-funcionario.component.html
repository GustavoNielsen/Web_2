<div class="container-fluid mt-4">
  <div class="row justify-content-center">
    <div class="col-lg-5 col-md-7 col-11">
 
      <div class="card shadow border-0">
        <div class="card-header bg-primary text-white text-center py-3">
          <h1 class="mb-0 h4 fw-bold">NOVO FUNCIONÁRIO</h1>
        </div>

        <div class="card-body p-4 bg-light">
            <form #formFuncionario="ngForm">
                <div class="mb-3">
                    <label for="nome"  class="form-label fw-bold text-dark">Nome:</label>
                    <input type="text" class="form-control form-control-lg" id="nome" name="nome" 
                        placeholder="Nome completo" [(ngModel)]="funcionario.nome"
                        #nome="ngModel" minlength="2" required>
                    <div *ngIf="nome.errors && (nome.dirty || nome.touched)" class="alert alert-danger">
                    <div [hidden]="!nome.errors['required']">
                    Digite o nome da pessoa.
                    </div>
                    <div [hidden]="!nome.errors['minlength']">
                    O nome deve conter ao menos 2 caracteres.
                    </div>
                </div>
        </div>
<div class="mb-3">
<label for="email" class="form-label fw-bold text-dark">Email:</label>
<input type="text" class="form-control form-control-lg" id="email" name="email" required
    [(ngModel)]="funcionario.email"
    #email="ngModel" required>
<div *ngIf="email.errors && (email.dirty || email.touched)" class="alert alert-danger">
<div [hidden]="!email.errors['required']">
Digite o email do funcionário.
</div>
</div>
</div>
<div class="mb-4">
<label for="nasc" class="form-label fw-bold text-dark">Data de Nascimento:</label>
<input type="date" class="form-control form-control-lg" id="nasc" name="nasc" required
    [(ngModel)]="funcionario.nasc"
    #nasc="ngModel">
<div *ngIf="nasc.errors && (nasc.dirty || nasc.touched)" class="alert alert-danger">
<div [hidden]="!nasc.errors['required']">
Digite a data de nascimento do funcionário.
</div>
</div>
</div>

<div class="form-group">
<button type="button" class="btn btn-primary"

(click)="inserir()"
[disabled]="!formFuncionario.form.valid">
<i class="fa fa-save"></i> Salvar
</button>
<a class="btn btn-secondary" [routerLink]="['/funcionario/users']">
<i class="fa fa-arrow-left"></i> Voltar
</a>
</div>
</form>
</div>
