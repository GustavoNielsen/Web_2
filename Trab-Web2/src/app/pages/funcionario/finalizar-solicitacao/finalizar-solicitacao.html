<div class="modal-header bg-success text-white">
  <h5 class="modal-title fw-bold">Finalizar Ordem de Serviço</h5>
  <button class="btn btn-close" data-bs-dismiss="modal" (click)="cancelarFinalizacao()"></button>
</div>

<div class="modal-body">
  <p>Deseja confirmar a finalização da OS <strong>#{{ solicitacao?.id }}</strong>?</p>
  <div class="alert alert-info">
    <div><strong>Cliente:</strong> {{ solicitacao?.nomeCliente }}</div>
    <div><strong>Equipamento:</strong> {{ solicitacao?.descricaoEquipamento }}</div>
  </div>
  <p class="text-muted small">Essa ação vai registrar a entrega do equipamento ao cliente.</p>
</div>

<div class="modal-footer">
  <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal" (click)="cancelarFinalizacao()">Voltar</button>
  <button type="button" class="btn btn-success fw-bold" data-bs-dismiss="modal" (click)="confirmarFinalizacao()">Sim, Finalizar OS</button>
</div>
