<div class="modal-header bg-primary text-white">
  <h5 class="modal-title fw-bold">Redirecionar Manutenção</h5>
  <button type="button" class="btn btn-close" data-bs-dismiss="modal" (click)="cancelarRedirecionamento()"></button>
</div>

<div class="modal-body">
  <p>Selecione um funcionário para repassar a OS <strong>#{{ solicitacao?.id }}</strong>:</p>
  
  <div class="mb-3">
    <label class="form-label fw-bold">Funcionário Destino:</label>
    <select class="form-select" [(ngModel)]="funcionarioSelecionado">
      <option value="" disabled selected>Selecione um técnico</option>
      @for (f of funcionarios; track f.id) {
        <option [value]="f.nome">{{ f.nome }}</option>
      }
    </select>
  </div>

  <div class="alert alert-warning small"><strong>Atenção:</strong> A solicitação será repassada ao funcionário selecionado e seu estado será alterado para <strong>REDIRECIONADA</strong>.</div>
</div>

<div class="modal-footer">
  <button type="button" class="btn btn-outline-secondary" data-bs-toggle="modal" data-bs-target="#modalManutencao" (click)="cancelarRedirecionamento()">Voltar</button>
  <button type="button" class="btn btn-primary fw-bold" data-bs-dismiss="modal" [disabled]="!funcionarioSelecionado" (click)="confirmarRedirecionamento()">Confirmar Redirecionamento</button>
</div>
