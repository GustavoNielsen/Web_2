<div class="modal-header bg-primary text-white">
  <h5 class="modal-title fw-bold">Redirecionar Manutencao</h5>
  <button type="button" class="btn btn-close" data-bs-dismiss="modal" (click)="cancelarRedirecionamento()"></button>
</div>

<div class="modal-body">
  <p>Selecione um funcionario para repassar a OS <strong>#{{ solicitacao?.id }}</strong>:</p>

  <div class="mb-3">
    <label class="form-label fw-bold">Funcionario Destino:</label>
    <select class="form-select" [(ngModel)]="funcionarioSelecionado">
      <option [ngValue]="null" disabled>Selecione um tecnico</option>
      @for (f of funcionarios; track f.id) {
        <option [ngValue]="f.id">{{ f.nome }}</option>
      }
    </select>
  </div>

  <div class="alert alert-warning small">
    <strong>Atencao:</strong> A solicitacao sera repassada ao funcionario selecionado e seu estado sera alterado para <strong>REDIRECIONADA</strong>.
  </div>
</div>

<div class="modal-footer">
  <button type="button" class="btn btn-outline-secondary" data-bs-toggle="modal" data-bs-target="#modalManutencao" [disabled]="salvando" (click)="cancelarRedirecionamento()">Voltar</button>
  <button type="button" class="btn btn-primary fw-bold" data-bs-dismiss="modal" [disabled]="!funcionarioSelecionado || salvando" (click)="confirmarRedirecionamento()">
    {{ salvando ? 'Redirecionando...' : 'Confirmar Redirecionamento' }}
  </button>
</div>
