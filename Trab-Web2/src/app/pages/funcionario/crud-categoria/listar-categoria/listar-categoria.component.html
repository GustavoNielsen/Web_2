<div class="container-fluid mt-4">
  <div class="row justify-content-center">
    <div class="col-lg-6 col-md-8 col-11">
 
      <div class="card shadow border-0">
        <div class="card-header bg-primary text-white py-3 d-flex justify-content-between align-items-center">
<h1 class="mb-0 h4 fw-bold">Categorias Equipamentos</h1>
 <a [routerLink]="['/funcionario/equipamento/novo']" class="btn btn-light btn-sm fw-bold">
            <i class="fa fa-plus"></i> Novo
          </a>
        </div>
 
        <div class="card-body p-4 bg-light">
          <table class="table table-striped table-bordered table-hover bg-white mb-0">
            <thead class="table-primary">
              <tr>
                <th>Nome</th>
                <th class="text-center" style="width: 180px">Ações</th>
              </tr>
            </thead>
            <tbody>
              @for (categoria of categorias; track categoria.id) {
                <tr>
                  <td>{{ categoria.nome }}</td>
                  <td class="text-center">
                    <a href="#" class="btn btn-sm btn-info me-1" title="Editar"
                       [routerLink]="['/funcionario/equipamento/editar', categoria.id]">
                      <i class="fa fa-edit"></i> Editar
                    </a>
                    <a href="#" class="btn btn-sm btn-danger" title="Remover"
                       (click)="remover($event, categoria)">
                      <i class="fa fa-times"></i> Remover
                    </a>
                  </td>
                </tr>
              }
              @empty {
                <tr>
                  <td colspan="2" class="text-center text-muted py-3">Nenhuma categoria cadastrada.</td>
                </tr>
              }
            </tbody>
          </table>
        </div>
      </div>
 
      <p class="text-center text-muted mt-3 small">Trabalho de Desenvolvimento Web II</p>
    </div>
  </div>
</div>
