<h1>Categorias Equipamentos</h1>
<table class="table table-striped table-bordered table-hover">
<tbody>
<tr>
<th>Nome</th>
<th class="text-center">
  <a [routerLink]="['/categorias/novo']" title="Novo" alt="Novo" class="btn btn-xs btn-success">
    <i class="fa fa-plus" aria-hidden="true"></i> Novo
  </a>
</th>
</tr>
@for (categoria of categorias; track categoria.id) {
<tr>
  <td>{{ categoria.nome }}</td>
  <td class="text-center" style="width: 300px">
    <a href="#" title="Editar" alt="Editar" class="btn btn-xs btn-info">
      <i class="fa fa-edit" aria-hidden="true"></i> Editar
    </a>
    <a href="#" title="Remover" alt="Remover" class="btn btn-xs btn-danger">
      <i class="fa fa-times" aria-hidden="true"></i> Remover
    </a>
  </td>
</tr>
}
@empty {
<tr>
  <td colspan="2" class="text-center">Nenhuma categoria cadastrada.</td>
</tr>
}
</tbody>
</table>
