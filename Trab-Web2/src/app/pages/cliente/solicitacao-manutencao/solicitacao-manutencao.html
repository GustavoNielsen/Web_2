<div class="container-fluid d-flex justify-content-center p-3">
    <form class="card shadow-sm w-100" style="max-width: 700px; border: 1px solid #0d6efd;">
        
        <div class="card-header bg-primary text-white p-3">
            <h1 class="h5 mb-0 fw-bold text-center">{{titulo}}</h1>
        </div>

        <div class="card-body p-4">
            <div class="mb-3">
                <label class="form-label fw-bold small text-uppercase text-muted">Equipamento</label>
                <input type="text" 
                       name="descEquip" 
                       [(ngModel)]="descricaoEquipamento" 
                       class="form-control" 
                       placeholder="Ex: Notebook Lenovo Yoga">
            </div>
            
            <div class="mb-3">
                <label class="form-label fw-bold small text-uppercase text-muted">Tipo</label>
                <select [(ngModel)]="tipoEquipamento" 
                        name="tipoEquipamento" 
                        class="form-select"
                        [class.is-invalid]="erroTipoEquipamento">
                    <option value="">Selecione o tipo...</option>
                    <option value="notebook">Notebook</option>
                    <option value="smartphone">Smartphone</option>
                    <option value="monitor">Monitor</option>
                    <option value="impressora">Impressora</option>
                </select>
                @if (erroTipoEquipamento) {
                    <div class="invalid-feedback">
                        {{ mensagemErroEquipamentoSelect }}
                    </div>
                }
            </div>

            <div class="mb-4">
                <label class="form-label fw-bold small text-uppercase text-muted">Descrição do Problema</label>
                <textarea name="descProb" 
                        [(ngModel)]="descricaoProblema" 
                        class="form-control" 
                        placeholder="Descreva o defeito detalhadamente..."
                        rows="5"></textarea>
            </div>
            
            <button type="button" 
                    (click)="enviarSolicitacao()" 
                    class="btn btn-primary w-100 fw-bold py-2">
                Realizar Solicitação
            </button>
        </div>
    </form>
</div>
